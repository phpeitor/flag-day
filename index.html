<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>🇵🇪 Flag Day</title>
  <link rel="stylesheet" href="./css/style.css?v=2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🏁</text></svg>" />
</head>
<body>

<div class="logo">

</div>

<div class="button-container">
  <a href="#">
      <svg class="spark" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M93.781 51.578C95 50.969 96 49.359 96 48c0-1.375-1-2.969-2.219-3.578 0 0-22.868-1.514-31.781-10.422-8.915-8.91-10.438-31.781-10.438-31.781C50.969 1 49.375 0 48 0s-2.969 1-3.594 2.219c0 0-1.5 22.87-10.406 31.781-8.908 8.913-31.781 10.422-31.781 10.422C1 45.031 0 46.625 0 48c0 1.359 1 2.969 2.219 3.578 0 0 22.873 1.51 31.781 10.422 8.906 8.911 10.406 31.781 10.406 31.781C45.031 95 46.625 96 48 96s2.969-1 3.562-2.219c0 0 1.523-22.871 10.438-31.781 8.913-8.908 31.781-10.422 31.781-10.422Z"
          fill="#000"
        />

      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M93.781 51.578C95 50.969 96 49.359 96 48c0-1.375-1-2.969-2.219-3.578 0 0-22.868-1.514-31.781-10.422-8.915-8.91-10.438-31.781-10.438-31.781C50.969 1 49.375 0 48 0s-2.969 1-3.594 2.219c0 0-1.5 22.87-10.406 31.781-8.908 8.913-31.781 10.422-31.781 10.422C1 45.031 0 46.625 0 48c0 1.359 1 2.969 2.219 3.578 0 0 22.873 1.51 31.781 10.422 8.906 8.911 10.406 31.781 10.406 31.781C45.031 95 46.625 96 48 96s2.969-1 3.562-2.219c0 0 1.523-22.871 10.438-31.781 8.913-8.908 31.781-10.422 31.781-10.422Z"
          fill="#000"
        />
      </svg>

      <svg viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M93.781 51.578C95 50.969 96 49.359 96 48c0-1.375-1-2.969-2.219-3.578 0 0-22.868-1.514-31.781-10.422-8.915-8.91-10.438-31.781-10.438-31.781C50.969 1 49.375 0 48 0s-2.969 1-3.594 2.219c0 0-1.5 22.87-10.406 31.781-8.908 8.913-31.781 10.422-31.781 10.422C1 45.031 0 46.625 0 48c0 1.359 1 2.969 2.219 3.578 0 0 22.873 1.51 31.781 10.422 8.906 8.911 10.406 31.781 10.406 31.781C45.031 95 46.625 96 48 96s2.969-1 3.562-2.219c0 0 1.523-22.871 10.438-31.781 8.913-8.908 31.781-10.422 31.781-10.422Z"

</div>
  
<div class="sparkle">
	<em>Día de la Bandera</em>
</div>

<div class="layer">
  <div class="heart" aria-hidden="false">
    <!-- viewBox ampliado y centrado para evitar por completo el recorte de sombras y path -->
    <svg class="heart-svg" viewBox="-40 -30 320 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Corazón con banda de la bandera del Perú">
      <defs>
        <linearGradient id="heartGrad" x1="0" x2="1">
          <!-- Transparencia para dejar ver la bandera -->
          <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.65"/>
          <stop offset="50%" stop-color="#e53935" stop-opacity="0.75"/>
          <stop offset="100%" stop-color="#b71c1c" stop-opacity="0.8"/>
        </linearGradient>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.45"/>
        </filter>
        <linearGradient id="sashGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.7"/>
        </linearGradient>
      </defs>
      <g filter="url(#softShadow)">
        <path class="heart-shape" d="M120 214s-90-54-90-124c0-38 31-70 70-70 24 0 40 13 45 20 5-7 21-20 45-20 39 0 70 32 70 70 0 70-90 124-90 124z" fill="url(#heartGrad)"/>
        <!-- Franja más delgada y perfectamente centrada -->
        <g transform="rotate(-26 120 110)">
          <rect x="-24" y="104" width="288" height="12" rx="6" fill="url(#sashGrad)"/>
          <rect x="-24" y="108" width="288" height="4" rx="2" fill="#c1121f" opacity="0.9"/>
        </g>
        <!-- Brillo ajustado -->
        <path class="gloss" d="M42 28c16-12 34-18 58-18 18 0 34 4 46 12 12-8 28-12 46-12 24 0 42 6 58 18v34c-36-34-66-24-104 4-38-28-68-38-104-4z" fill="rgba(255,255,255,0.08)"/>
      </g>
    </svg>
  </div>
  
  <div class="balls"> 
    <div class="ball ball-1"></div>
    <div class="ball ball-2"></div>
    <div class="ball ball-3"></div>
    <div class="ball ball-4"></div>
  </div>
</div>

<script  src="./js/script.js?v=2"></script>
</body>
</html>
