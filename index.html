<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🇵🇪 Flag Day</title>
  <meta name="description" content="Landing conmemorativa del Día de la Bandera del Perú con una evolución visual de sus banderas y efectos animados">
  <link rel="stylesheet" href="./css/style.css?v=2">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='85'>🏁</text></svg>" />
</head>
<body>

<video autoplay muted loop id="bg-video">
  <source src="./resources/bandera.mp4" type="video/mp4">
  Your browser does not support the video tag.
</video>

<div class="logo">
    <div class="box">
        <img src="./resources/flag-day.png" alt="Logo Phpeitor">
    </div>
</div>

<section class="flag-slider" id="flag-slider" aria-label="Evolución de la bandera del Perú"></section>

<div class="button-container">
  <a href="#" id="action-btn">
      <span aria-hidden="true"></span>
  </a>
</div>
  
<div class="sparkle">
	<em>Día de la Bandera</em>
</div>

<div class="layer">
  <div class="heart" aria-hidden="false">
    <svg class="heart-svg" viewBox="-40 -30 320 310" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Corazón con banda de la bandera del Perú">
      <defs>
        <clipPath id="heartClip">
          <path d="M 120 213.5 l -14.5 -13.2 C 54 153.6 20 122.8 20 85 C 20 54.2 44.2 30 75 30 c 17.4 0 34.1 8.1 45 20.9 c 10.9 -12.8 27.6 -20.9 45 -20.9 c 30.8 0 55 24.2 55 55 c 0 37.8 -34 68.6 -85.5 115.4 Z" />
        </clipPath>
        <linearGradient id="heartGrad" x1="0" x2="1">
          <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.45"/>
          <stop offset="50%" stop-color="#e53935" stop-opacity="0.55"/>
          <stop offset="100%" stop-color="#b71c1c" stop-opacity="0.6"/>
        </linearGradient>
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
          <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.55"/>
        </filter>
        <linearGradient id="sashGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.75"/>
        </linearGradient>
      </defs>
      <g filter="url(#softShadow)" class="heart-shape">
        <path d="M 120 213.5 l -14.5 -13.2 C 54 153.6 20 122.8 20 85 C 20 54.2 44.2 30 75 30 c 17.4 0 34.1 8.1 45 20.9 c 10.9 -12.8 27.6 -20.9 45 -20.9 c 30.8 0 55 24.2 55 55 c 0 37.8 -34 68.6 -85.5 115.4 Z" fill="url(#heartGrad)"/>
        <g clip-path="url(#heartClip)">
          <g transform="rotate(-35 120 120)">
            <rect x="-60" y="100" width="360" height="40" fill="url(#sashGrad)"/>
            <rect x="-60" y="112" width="360" height="16" fill="#c1121f" opacity="0.95"/>
          </g>
          <path class="gloss" d="M42 28c16-12 34-18 58-18 18 0 34 4 46 12 12-8 28-12 46-12 24 0 42 6 58 18v34c-36-34-66-24-104 4-38-28-68-38-104-4z" fill="rgba(255,255,255,0.15)"/>
        </g>
      </g>
    </svg>
  </div>
  
  <div class="balls" id="balls-container"> 
  </div>
</div>

<script  src="./js/script.js?v=2"></script>
</body>
</html>
